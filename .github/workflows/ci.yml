name: Tests & Quality Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit tests + lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install dev tools
        run: pip install ruff

      - name: Lint (ruff — pyflakes + syntax only)
        # Narrow ruleset on purpose: pyflakes catches real bugs (unused
        # imports, undefined names, etc.) without turning every PR into a
        # style argument. E9 catches syntax errors.
        run: ruff check src/ tests/ evaluation/ --select F,E9

      - name: Unit tests
        # All tests are agent/redactor/orchestrator units with mocked Claude —
        # zero API spend. The live eval suite is the separate gated job below.
        run: |
          mkdir -p artifacts
          python -m pytest tests/ \
            --junit-xml=artifacts/pytest-results.xml \
            -v

      - name: Upload pytest results
        if: always()  # surface report even on test failure
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: artifacts/pytest-results.xml
          retention-days: 90

  docker-build:
    name: Docker build verification
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (verification only — no registry push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          # We skip `load: true` deliberately. The CPU-only torch wheel keeps
          # the image around 1 GB; loading it into the local Docker daemon on
          # the runner competes with the buildx cache for disk. The
          # verification-only build (no load) is enough as a regression gate.
          # Run it locally to inspect: `docker build -t backlog-synthesizer .`
          load: false
          tags: backlog-synthesizer:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  eval-suite:
    name: Eval suite (gated, live LLM)
    runs-on: ubuntu-latest
    # Burning real Anthropic credit, so we gate the trigger: never on PRs
    # from forks, never automatically. workflow_dispatch only — someone has
    # to consciously click "Run workflow". Push to main also triggers so
    # main stays green-gated on the eval harness.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' }}
    needs: unit-tests
    timeout-minutes: 20
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip if no API key configured
        # Forks won't have the secret; rather than failing the job, gate
        # downstream steps on this output so the job ends cleanly.
        id: gate
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping eval suite — ANTHROPIC_API_KEY secret not configured."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        if: steps.gate.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run eval suite (Anthropic Claude)
        # 10 golden cases, ~5 API calls each → ~50 calls per full run.
        # Cost on Sonnet at current pricing: roughly $2-4 per full run.
        # Tee output so it lands both in the job log (for quick read) and
        # in an artifact (for download / diff against previous runs).
        if: steps.gate.outputs.skip != 'true'
        run: |
          mkdir -p artifacts
          python evaluation/run_evaluation.py --use-llm-judge 2>&1 \
            | tee artifacts/eval-results.txt

      - name: Regression dashboard
        # Aggregate results across runs and surface deterministic drops
        # between this run and the previous one. Markdown output is
        # uploaded as an artifact for review.
        if: steps.gate.outputs.skip != 'true'
        run: |
          python evaluation/dashboard.py --md artifacts/dashboard.md 2>&1 \
            | tee artifacts/dashboard.txt

      - name: Upload eval results
        if: always() && steps.gate.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: |
            artifacts/eval-results.txt
            artifacts/dashboard.txt
            artifacts/dashboard.md
            evaluation/results/**
          retention-days: 90
