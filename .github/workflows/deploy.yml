name: Deploy to Azure Container Apps

# Triggers:
#   push to main  → staging environment (automatic)
#   manual trigger → choose staging or production
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options: [staging, production]
        default: staging
      reason:
        description: "Reason for manual deploy (recorded in summary)"
        required: false
        default: "Manual trigger"

env:
  # Set these in your GitHub repository → Settings → Secrets and variables → Actions
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}           # e.g. backlogsynth.azurecr.io
  IMAGE_NAME: backlog-synthesizer
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}  # e.g. rg-backlog-synthesizer
  CONTAINERAPP_NAME: ${{ secrets.CONTAINERAPP_NAME }}  # e.g. backlog-synthesizer

jobs:
  # ── Job 1: Tests (same as ci.yml but runs inline here to gate deploy) ─────
  test:
    name: Tests + lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint
        run: ruff check src/ tests/ evaluation/ --select F,E9

      - name: Unit tests
        run: python -m pytest tests/ -q --tb=short

  # ── Job 2: Build Docker image and push to ACR ─────────────────────────────
  build-and-push:
    name: Build → ACR
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    # Needs environment to access AZURE_CREDENTIALS and ACR_REGISTRY (environment secrets)
    environment: ${{ github.event.inputs.environment || 'staging' }}
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}
      full-image: ${{ steps.tag.outputs.full }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: |
          TAG="${{ github.sha }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "full=${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "Image will be: ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}"

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_REGISTRY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to ACR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.tag.outputs.full }}
            ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_REF=${{ github.ref_name }}

      - name: Summary
        run: |
          echo "### Image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${{ steps.tag.outputs.full }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ── Job 3: Deploy to Azure Container Apps ─────────────────────────────────
  deploy:
    name: Deploy → Azure Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 15
    # Environment secrets: AZURE_CREDENTIALS, ACR_REGISTRY, CONTAINERAPP_NAME,
    # AZURE_RESOURCE_GROUP scoped to staging or production.
    # Production requires reviewer approval before deployment proceeds.
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}
      url: ${{ steps.get-url.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Container Apps CLI extension
        run: az extension add --name containerapp --upgrade --yes

      - name: Deploy new revision to Container Apps
        run: |
          IMAGE="${{ needs.build-and-push.outputs.full-image }}"
          echo "Deploying image: $IMAGE"
          echo "App: ${{ env.CONTAINERAPP_NAME }}"
          echo "RG:  ${{ env.AZURE_RESOURCE_GROUP }}"

          SHORT_SHA="${{ github.sha }}"
          az containerapp update \
            --name "${{ env.CONTAINERAPP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --image "$IMAGE" \
            --revision-suffix "${SHORT_SHA:0:7}" \
            --set-env-vars \
              "ANTHROPIC_API_KEY=secretref:anthropic-api-key" \
              "GOOGLE_API_KEY=secretref:google-api-key" \
              "JIRA_BASE_URL=${{ secrets.JIRA_BASE_URL }}" \
              "JIRA_EMAIL=${{ secrets.JIRA_EMAIL }}" \
              "JIRA_API_TOKEN=secretref:jira-api-token" \
              "JIRA_PROJECT_KEY=${{ secrets.JIRA_PROJECT_KEY }}" \
              "GITHUB_TOKEN=${{ secrets.GH_TOKEN }}" \
              "GITHUB_OWNER=${{ secrets.GH_OWNER }}" \
              "GITHUB_REPO=${{ secrets.GH_REPO }}" \
              "GITHUB_MCP_ENABLED=1" \
              "ATLASSIAN_MCP_ENABLED=1" \
              "ENTRA_TENANT_ID=${{ secrets.ENTRA_TENANT_ID }}" \
              "ENTRA_TENANT_DOMAIN=${{ secrets.ENTRA_TENANT_DOMAIN }}" \
              "ENTRA_CLIENT_ID=${{ secrets.ENTRA_CLIENT_ID }}" \
              "ENTRA_CLIENT_SECRET=secretref:entra-client-secret" \
              "ENTRA_REDIRECT_URI=${{ secrets.ENTRA_REDIRECT_URI }}" \
              "AUTH_COOKIE_SECRET=${{ secrets.AUTH_COOKIE_SECRET }}" \
              "SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}" \
              "OTEL_ENABLED=1" \
              "OTEL_SERVICE_NAME=backlog-synthesizer" \
              "OTEL_EXPORTER_OTLP_ENDPOINT=${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}" \
              "OTEL_EXPORTER_OTLP_HEADERS=${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}" \
              "AUTH_DISABLED=0"

      - name: Wait for revision to be active
        run: |
          echo "Waiting for revision to stabilise..."
          sleep 20
          az containerapp revision list \
            --name "${{ env.CONTAINERAPP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --output table

      - name: Get app URL
        id: get-url
        run: |
          URL=$(az containerapp show \
            --name "${{ env.CONTAINERAPP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          echo "url=https://${URL}" >> "$GITHUB_OUTPUT"
          echo "App deployed to: https://${URL}"

      - name: Health check
        run: |
          URL="${{ steps.get-url.outputs.url }}"
          echo "Running health check against ${URL}/_stcore/health"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 "${URL}/_stcore/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: status=${STATUS} — waiting 15s..."
            sleep 15
          done
          echo "Health check failed after 5 attempts"
          exit 1

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Environment** | ${{ github.event.inputs.environment || 'staging' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image** | \`${{ needs.build-and-push.outputs.full-image }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ github.sha }}\` by ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **URL** | ${{ steps.get-url.outputs.url }} |" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ github.event.inputs.reason }}" ]; then
            echo "| **Reason** | ${{ github.event.inputs.reason }} |" >> "$GITHUB_STEP_SUMMARY"
          fi

  # ── Job 4: Notify on failure ───────────────────────────────────────────────
  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [test, build-and-push, deploy]
    if: failure()
    steps:
      - name: Failure summary
        run: |
          echo "## Deployment FAILED" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: \`${{ github.sha }}\` by ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Check the failed job above for details." >> "$GITHUB_STEP_SUMMARY"
